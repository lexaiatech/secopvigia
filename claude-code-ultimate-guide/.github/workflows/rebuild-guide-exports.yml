name: Rebuild Guide Exports (PDF + EPUB)

on:
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  push:
    branches: ["main"]
    paths:
      - "guide/ultimate-guide.md"
      - "whitepapers/guide-export.qmd"
      - "scripts/preprocess-guide.py"
      - "whitepapers/_extensions/whitepaper/**"
      - "whitepapers/nocite.lua"
      - "whitepapers/fix-lists.lua"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install pandoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc

      - name: Install Inter + JetBrains Mono fonts
        run: |
          mkdir -p ~/.local/share/fonts
          # Inter
          curl -sL https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip -o /tmp/inter.zip
          unzip -q /tmp/inter.zip -d /tmp/inter
          find /tmp/inter -name "*.ttf" -exec cp {} ~/.local/share/fonts/ \;
          # JetBrains Mono
          curl -sL https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip -o /tmp/jbmono.zip
          unzip -q /tmp/jbmono.zip -d /tmp/jbmono
          find /tmp/jbmono -name "*.ttf" -exec cp {} ~/.local/share/fonts/ \;
          fc-cache -f

      - name: Preprocess guide
        run: python3 scripts/preprocess-guide.py

      - name: Render PDF
        run: |
          cd whitepapers
          quarto render guide-export.qmd --to whitepaper-typst

      - name: Render EPUB
        run: |
          cd whitepapers
          quarto render guide-export.qmd --to epub

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: guide-export-v${{ steps.version.outputs.version }}
          name: "Claude Code Ultimate Guide — PDF & EPUB Export v${{ steps.version.outputs.version }}"
          body: |
            Auto-generated from `guide/ultimate-guide.md` on every push that modifies the guide.

            | Format | Download |
            |--------|----------|
            | **PDF** (full guide) | [guide-export.pdf](https://github.com/FlorianBruniaux/claude-code-ultimate-guide/releases/latest/download/guide-export.pdf) |
            | **EPUB** (e-reader) | [guide-export.epub](https://github.com/FlorianBruniaux/claude-code-ultimate-guide/releases/latest/download/guide-export.epub) |

            Built with Quarto + Typst. Pipeline: `scripts/preprocess-guide.py` → `whitepapers/guide-export.qmd`.
          files: |
            whitepapers/guide-export.pdf
            whitepapers/guide-export.epub
          make_latest: "true"
